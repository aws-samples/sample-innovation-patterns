<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web-client</title>
    <!-- Runtime config: sets window.__CONFIG__ before the app loads.
         Copy config.template.js to config.js for local dev.
         In production, dist/config.js is overwritten at deploy time.
         config.local.js is loaded only on localhost for local auth testing. -->
    <script src="/config.js"></script>
    <script>
      if (location.hostname === 'localhost') {
        var s = document.createElement('script');
        s.src = '/config.local.js';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
