# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/main/automated_security_helper/schemas/AshConfig.json
project_name: innovation-patterns

global_settings:
  suppressions:
    # Bandit B101: assert is the standard pytest assertion mechanism, not a production guard clause
    - rule_id: 'B101'
      path: 'utils/tests/*'
      reason: 'assert statements are expected in pytest test files'
    - rule_id: 'B101'
      path: 'app-lib/tests/*'
      reason: 'assert statements are expected in pytest test files'
    # Bandit B603/B404: utils is a CLI tool that invokes docker/pytest/ash via subprocess with list args (no shell)
    - rule_id: 'B603'
      path: 'utils/*'
      reason: 'CLI tool uses subprocess with list invocation (no shell) for docker, pytest, and ASH'
    - rule_id: 'B404'
      path: 'utils/*'
      reason: 'subprocess import is required for CLI tool that wraps docker, pytest, and ASH'
    # pygments 2.19.2 is latest available; no patched version released yet
    - rule_id: 'GHSA-5239-wwwm-4pmq-pygments'
      path: 'utils/uv.lock'
      reason: 'pygments is a dev-only dependency (via pytest), no fix available yet'
      expiration: '2026-06-26'
    - rule_id: 'GHSA-5239-wwwm-4pmq-pygments'
      path: 'app-lib/uv.lock'
      reason: 'pygments is a dev-only dependency (via pytest), no fix available yet'
      expiration: '2026-06-26'
    # GenerateSecret is a standard CloudFormation property name, not an actual secret value
    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'infra/cfn/cognito/cognito.yml'
      reason: 'False positive — GenerateSecret: false is a CloudFormation property on AWS::Cognito::UserPoolClient, not a secret value'
    # AdvancedSecurityMode is already ENFORCED — scanner false positive
    - rule_id: 'AwsSolutions-COG3'
      path: 'infra/cfn/cognito/cognito.yml'
      reason: 'False positive — AdvancedSecurityMode is already set to ENFORCED on the CognitoUserPool resource'
    # Jinja2 direct use — renders YAML/text templates, not HTML served to a browser; no XSS vector
    - rule_id: 'python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2'
      path: 'app-lib/src/app_lib/util/jinja_util.py'
      reason: 'JinjaUtil renders YAML/text templates for code generation, not HTML served in a browser — no XSS vector'
    # DynamoDB PITR not needed for test fixture
    - rule_id: 'AwsSolutions-DDB3'
      path: 'utils/tests/fixtures/*'
      reason: 'Test fixture — PITR not needed for unit tests'
    # OpenAPI schema is auto-generated by FastAPI and lacks securitySchemes declarations,
    # but the API is protected at runtime by JWTAuthMiddleware (app_lib/rest/auth.py)
    # which validates Cognito Bearer tokens on all non-public paths
    - rule_id: 'CKV_OPENAPI_4'
      path: 'web-client/openapi-schema.json'
      reason: 'Auto-generated OpenAPI spec does not declare security schemes, but all API endpoints are protected by JWTAuthMiddleware with Cognito JWT validation'
    # ECR KMS encryption — out of scope for POC; uses default AES-256 encryption.
    # Customers can add a KMS key via the EncryptionConfiguration property when productionizing.
    - rule_id: 'CKV_AWS_136'
      path: 'infra/cfn/ecr/ecr.yml'
      reason: 'Out of scope for POC — ECR uses default AES-256 encryption; customers can add KMS EncryptionConfiguration when productionizing'
    # ECR immutable tags — out of scope for POC; mutable tags allow iterative development.
    # Customers should switch to IMMUTABLE when productionizing.
    - rule_id: 'CKV_AWS_51'
      path: 'infra/cfn/ecr/ecr.yml'
      reason: 'Out of scope for POC — mutable tags simplify iterative development; switch to IMMUTABLE when productionizing'
    # OpenAPI array maxItems — auto-generated by FastAPI; API already enforces practical
    # limits via query params (limit capped at 2000/500). Adding maxItems requires
    # customizing Pydantic models or OpenAPI generation — out of scope for POC.
    - rule_id: 'CKV_OPENAPI_21'
      path: 'web-client/openapi-schema.json'
      reason: 'Out of scope for POC — auto-generated FastAPI schema; API enforces practical limits via capped query params'
    # Same root cause as CKV_OPENAPI_4 — auto-generated FastAPI schema has no security
    # operations declared, but runtime auth is enforced by JWTAuthMiddleware
    - rule_id: 'CKV_OPENAPI_5'
      path: 'web-client/openapi-schema.json'
      reason: 'Auto-generated OpenAPI spec has no security operations, but all API endpoints are protected by JWTAuthMiddleware with Cognito JWT validation'
    # brace-expansion 1.1.13 is the latest v1.x; no fix available.
    # Transitive dep of @docusaurus/core → serve-handler → minimatch@3, pinned to ^1.
    - rule_id: 'GHSA-f886-m6hf-6m8v-brace-expansion'
      path: 'docs/package-lock.json'
      reason: 'No fix available — 1.1.13 is the latest v1.x release; transitive dep pinned by minimatch@3 in @docusaurus/core'
      expiration: '2026-06-26'
    # CloudWatch Log Group KMS encryption — out of scope for POC; uses default encryption.
    # Customers can add a KmsKeyId property to the LogGroup when productionizing.
    - rule_id: 'CKV_AWS_158'
      path: 'infra/cfn/lambda/lambda.yml'
      reason: 'Out of scope for POC — CloudWatch Log Group uses default encryption; customers can add KmsKeyId when productionizing'
    - rule_id: 'CKV_AWS_158'
      path: 'infra/cfn/apigateway/apigateway.yml'
      reason: 'Out of scope for POC — CloudWatch Log Group uses default encryption; customers can add KmsKeyId when productionizing'
    # DynamoDB KMS CMK encryption — out of scope for POC; table uses default AWS-owned encryption (SSEEnabled: true).
    # Customers can add SSEType: KMS with a KMSMasterKeyId when productionizing.
    - rule_id: 'CKV_AWS_119'
      path: 'infra/cfn/dynamodb/dynamodb.yml'
      reason: 'Out of scope for POC — DynamoDB uses default AWS-owned encryption (SSEEnabled: true); customers can add KMS CMK when productionizing'
    # Lambda DLQ — DLQs only apply to asynchronous invocations; this Lambda is invoked
    # synchronously via API Gateway, so a DLQ would never receive messages.
    - rule_id: 'CKV_AWS_116'
      path: 'infra/cfn/lambda/lambda.yml'
      reason: 'Not applicable — Lambda is invoked synchronously via API Gateway; DLQ only triggers on async invocations'
    # DynamoDB PITR — out of scope for POC; customers can enable PointInTimeRecoverySpecification when productionizing.
    - rule_id: 'CKV_AWS_28'
      path: 'infra/cfn/dynamodb/dynamodb.yml'
      reason: 'Out of scope for POC — customers can enable PointInTimeRecoverySpecification when productionizing'
    # Lambda env var KMS encryption — out of scope for POC; uses default AWS-managed encryption.
    # Customers can add a KmsKeyArn on the Lambda function when productionizing.
    - rule_id: 'CKV_AWS_173'
      path: 'infra/cfn/lambda/lambda.yml'
      reason: 'Out of scope for POC — Lambda env vars use default AWS-managed encryption; customers can add KmsKeyArn when productionizing'
    # Lambda VPC configuration — out of scope for POC; requires VPC, subnets, and security groups.
    # Customers can add VpcConfig when productionizing.
    - rule_id: 'CKV_AWS_117'
      path: 'infra/cfn/lambda/lambda.yml'
      reason: 'Out of scope for POC — VPC configuration requires VPC, subnets, and security groups; customers can add VpcConfig when productionizing'
    # Dockerfile USER directive — not applicable for Lambda container images.
    # Lambda runs inside its own execution sandbox; the container USER has no security impact.
    - rule_id: 'dockerfile.security.missing-user.missing-user'
      path: 'infra/containers/rest-lambda/Dockerfile'
      reason: 'Not applicable — Lambda container images run inside Lambda execution sandbox; USER directive has no security impact'
    # path-to-regexp 0.1.12 — transitive dep pinned by express (used by Docusaurus dev server).
    # No fix available; express has not updated this dependency. Docs site only, not production-facing.
    - rule_id: 'GHSA-37ch-88jc-xwx2-path-to-regexp'
      path: 'docs/package-lock.json'
      reason: 'No fix available — pinned by express in Docusaurus; docs site only, not production-facing'
      expiration: '2026-06-30'
    # Dockerfile HEALTHCHECK — not applicable for Lambda container images.
    # Lambda manages function health internally; Docker HEALTHCHECK is ignored by the Lambda runtime.
    - rule_id: 'CKV_DOCKER_2'
      path: 'infra/containers/rest-lambda/Dockerfile'
      reason: 'Not applicable — Lambda container images; Docker HEALTHCHECK is ignored by the Lambda runtime'
    # API Gateway caching — not applicable; all routes are authenticated (user-specific responses)
    # and include SSE streaming. Customers can enable per-route caching when productionizing.
    - rule_id: 'CKV_AWS_120'
      path: 'infra/cfn/apigateway/apigateway.yml'
      reason: 'Not applicable — all routes return user-specific responses behind Cognito auth and include SSE streaming; caching would serve stale/wrong data. Customers can enable per-route caching when productionizing.'
