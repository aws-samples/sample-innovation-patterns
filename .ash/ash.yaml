# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/main/automated_security_helper/schemas/AshConfig.json
project_name: innovation-patterns

reporters:
  # ASH emits an empty `{}` CycloneDX document when no SBOM data is collected,
  # which GitLab's SBOM parser rejects with "Required GitLab CycloneDX
  # properties are missing". Disable until ASH emits a schema-valid SBOM or
  # a proper dependency-scanning integration is used instead.
  cyclonedx:
    enabled: false

global_settings:
  ignore_paths:
    # pytest.ini is not infrastructure-as-code — KICS misparses it as a config file
    - path: 'app-lib/pytest.ini'
      reason: 'Not IaC — pytest configuration file; KICS cannot parse INI format and emits false errors'
  suppressions:
    # Bandit B101: assert is the standard pytest assertion mechanism, not a production guard clause
    - rule_id: 'B101'
      path: 'utils/tests/*'
      reason: 'assert statements are expected in pytest test files'
    - rule_id: 'B101'
      path: 'app-lib/tests/*'
      reason: 'assert statements are expected in pytest test files'
    # Bandit B603/B404: utils is a CLI tool that invokes docker/pytest/ash via subprocess with list args (no shell)
    - rule_id: 'B603'
      path: 'utils/*'
      reason: 'CLI tool uses subprocess with list invocation (no shell) for docker, pytest, and ASH'
    - rule_id: 'B404'
      path: 'utils/*'
      reason: 'subprocess import is required for CLI tool that wraps docker, pytest, and ASH'
    # pygments — FIXED: upgraded to 2.20.0 in app-lib (2026-04-10). utils/uv.lock retained as safety net.
    - rule_id: 'GHSA-5239-wwwm-4pmq-pygments'
      path: 'utils/uv.lock'
      reason: 'pygments is a dev-only dependency (via pytest); upgrade utils/uv.lock separately if still on 2.19.x'
      expiration: '2026-06-26'
    # GenerateSecret is a standard CloudFormation property name, not an actual secret value
    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'infra/cfn/cognito/cognito.yml'
      reason: 'False positive — GenerateSecret: false is a CloudFormation property on AWS::Cognito::UserPoolClient, not a secret value'
    # AdvancedSecurityMode is already ENFORCED — scanner false positive
    - rule_id: 'AwsSolutions-COG3'
      path: 'infra/cfn/cognito/cognito.yml'
      reason: 'False positive — AdvancedSecurityMode is already set to ENFORCED on the CognitoUserPool resource'
    # Jinja2 direct use — renders YAML/text templates, not HTML served to a browser; no XSS vector
    - rule_id: 'python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2'
      path: 'app-lib/src/app_lib/common/util/jinja_util.py'
      reason: 'JinjaUtil renders YAML/text templates for code generation, not HTML served in a browser — no XSS vector'
    # Same finding from GitLab Advanced SAST (different rule ID, same root cause)
    - rule_id: 'python-jinja2-xss-autoescape-false-atomic'
      path: 'app-lib/src/app_lib/common/util/jinja_util.py'
      reason: 'JinjaUtil renders YAML/text templates for code generation, not HTML served in a browser — no XSS vector'
    # CRLF injection — false positive; header value is str(len(response_body)), always a non-negative integer.
    # No user input flows into the header; an integer string cannot contain CRLF characters.
    - rule_id: 'python-httpserver-crlfi-taint'
      path: 'app-lib/src/app_lib/common/lambda/lambda_handler.py'
      reason: 'False positive — Content-Length header value is str(len(bytes)), always a non-negative integer; no user input in header values'
    # DynamoDB PITR not needed for test fixture
    - rule_id: 'AwsSolutions-DDB3'
      path: 'utils/tests/fixtures/*'
      reason: 'Test fixture — PITR not needed for unit tests'
    # OpenAPI schema is auto-generated by FastAPI and lacks securitySchemes declarations,
    # but the API is protected at runtime by JWTAuthMiddleware (app_lib/rest/auth.py)
    # which validates Cognito Bearer tokens on all non-public paths
    - rule_id: 'CKV_OPENAPI_4'
      path: 'web-client/openapi-schema.json'
      reason: 'Auto-generated OpenAPI spec does not declare security schemes, but all API endpoints are protected by JWTAuthMiddleware with Cognito JWT validation'
    # ECR KMS encryption — out of scope for POC; uses default AES-256 encryption.
    # Customers can add a KMS key via the EncryptionConfiguration property when productionizing.
    - rule_id: 'CKV_AWS_136'
      path: 'infra/cfn/ecr/ecr.yml'
      reason: 'Out of scope for POC — ECR uses default AES-256 encryption; customers can add KMS EncryptionConfiguration when productionizing'
    # ECR immutable tags — out of scope for POC; mutable tags allow iterative development.
    # Customers should switch to IMMUTABLE when productionizing.
    - rule_id: 'CKV_AWS_51'
      path: 'infra/cfn/ecr/ecr.yml'
      reason: 'Out of scope for POC — mutable tags simplify iterative development; switch to IMMUTABLE when productionizing'
    # OpenAPI array maxItems — auto-generated by FastAPI; API already enforces practical
    # limits via query params (limit capped at 2000/500). Adding maxItems requires
    # customizing Pydantic models or OpenAPI generation — out of scope for POC.
    - rule_id: 'CKV_OPENAPI_21'
      path: 'web-client/openapi-schema.json'
      reason: 'Out of scope for POC — auto-generated FastAPI schema; API enforces practical limits via capped query params'
    # Same root cause as CKV_OPENAPI_4 — auto-generated FastAPI schema has no security
    # operations declared, but runtime auth is enforced by JWTAuthMiddleware
    - rule_id: 'CKV_OPENAPI_5'
      path: 'web-client/openapi-schema.json'
      reason: 'Auto-generated OpenAPI spec has no security operations, but all API endpoints are protected by JWTAuthMiddleware with Cognito JWT validation'
    # brace-expansion 1.1.13 is the latest v1.x; no fix available.
    # Transitive dep of @docusaurus/core → serve-handler → minimatch@3, pinned to ^1.
    - rule_id: 'GHSA-f886-m6hf-6m8v-brace-expansion'
      path: 'docs/package-lock.json'
      reason: 'No fix available — 1.1.13 is the latest v1.x release; transitive dep pinned by minimatch@3 in @docusaurus/core'
      expiration: '2026-06-26'
    # uuid@8.3.2 — buffer bounds check in v3/v5/v6 when `buf` is provided (CVE-2026-41907, GHSA-w5hq-g745-h8pq).
    # Transitive via @docusaurus/core → webpack-dev-server → sockjs. sockjs calls uuidv4() without a
    # `buf` argument (node_modules/sockjs/lib/transport.js:37), so the bounds bug cannot be triggered.
    # Dev-server dependency only — not in any deployed artifact. Pinned by sockjs@0.3.24.
    - rule_id: 'GHSA-w5hq-g745-h8pq-uuid'
      path: 'docs/pnpm-lock.yaml'
      reason: 'Not exploitable — sockjs calls uuid.v4() without the optional `buf` param that triggers the bounds bug. Dev-server only (webpack-dev-server transitive); not in shipped bundle. No fix available until sockjs updates.'
      expiration: '2026-06-26'
    - rule_id: 'CVE-2026-41907'
      path: 'docs/pnpm-lock.yaml'
      reason: 'Not exploitable — sockjs calls uuid.v4() without the optional `buf` param that triggers the bounds bug. Dev-server only (webpack-dev-server transitive); not in shipped bundle. No fix available until sockjs updates.'
      expiration: '2026-06-26'
    # ip-address 10.1.0 — XSS in Address6 HTML-emitting methods (CVE-2026-42338, GHSA-v2v4-37r5-5v8g).
    # No patched version published as of 2026-05-08 (advisory range: <=10.1.0). Transitive via
    # shadcn CLI → @modelcontextprotocol/sdk → express-rate-limit → ip-address. Dev-only dependency
    # (shadcn is a build-time CLI), not in the deployed web-client bundle.
    - rule_id: 'CVE-2026-42338'
      path: 'web-client/package-lock.json'
      reason: 'No upstream fix available — advisory range <=10.1.0; 10.2.0 is latest. Dev-only: transitive via shadcn CLI → express-rate-limit; not in deployed bundle. Vulnerable Address6 HTML methods are not called by express-rate-limit.'
      expiration: '2026-06-26'
    # Hono vulnerabilities — FIXED: upgraded from 4.12.14 to 4.12.18 via npm audit fix (2026-05-08).
    # Suppressions retained as safety net in case lockfile regeneration temporarily reverts.
    - rule_id: 'CVE-2026-44455'
      path: 'web-client/package-lock.json'
      reason: 'Fixed — upgraded to hono 4.12.18 (>=4.12.16 patched) via npm audit fix. Dev-only transitive via shadcn CLI. Suppression retained as safety net.'
      expiration: '2026-06-30'
    - rule_id: 'CVE-2026-44456'
      path: 'web-client/package-lock.json'
      reason: 'Fixed — upgraded to hono 4.12.18 (>=4.12.16 patched) via npm audit fix. Dev-only transitive via shadcn CLI. Suppression retained as safety net.'
      expiration: '2026-06-30'
    # PostCSS — FIXED: upgraded from 8.5.6 to 8.5.14 via npm audit fix (2026-05-08).
    # Suppressions retained as safety net.
    - rule_id: 'CVE-2026-41305'
      path: 'web-client/package-lock.json'
      reason: 'Fixed — upgraded to postcss 8.5.14 (>=8.5.10 patched) via npm audit fix. Suppression retained as safety net.'
      expiration: '2026-06-30'
    - rule_id: 'GHSA-qx2v-qp2m-jg93-postcss'
      path: 'web-client/package-lock.json'
      reason: 'Fixed — upgraded to postcss 8.5.14 (>=8.5.10 patched) via npm audit fix. Suppression retained as safety net.'
      expiration: '2026-06-30'
    # (Removed: lambda.yml, dynamodb.yml suppressions — templates deleted in tier consolidation)
    # Dockerfile USER directive — not applicable for Lambda container images.
    # Lambda runs inside its own execution sandbox; the container USER has no security impact.
    - rule_id: 'dockerfile.security.missing-user.missing-user'
      path: 'infra/containers/rest-lambda/Dockerfile'
      reason: 'Not applicable — Lambda container images run inside Lambda execution sandbox; USER directive has no security impact'
    # path-to-regexp — FIXED: upgraded to 0.1.13 via npm audit fix (2026-04-10)
    # Suppression retained in case lockfile regeneration temporarily reverts.
    - rule_id: 'GHSA-37ch-88jc-xwx2-path-to-regexp'
      path: 'docs/package-lock.json'
      reason: 'Fixed — upgraded to 0.1.13 via npm audit fix; suppression retained as safety net'
      expiration: '2026-06-30'
    # Dockerfile HEALTHCHECK — not applicable for Lambda container images.
    # Lambda manages function health internally; Docker HEALTHCHECK is ignored by the Lambda runtime.
    - rule_id: 'CKV_DOCKER_2'
      path: 'infra/containers/rest-lambda/Dockerfile'
      reason: 'Not applicable — Lambda container images; Docker HEALTHCHECK is ignored by the Lambda runtime'
    # Dockerfile container user — not applicable for Lambda container images.
    # Lambda runs inside its own execution sandbox; the container user has no security impact.
    - rule_id: 'CKV_DOCKER_3'
      path: 'infra/containers/rest-lambda/Dockerfile'
      reason: 'Not applicable — Lambda container images run inside Lambda execution sandbox; container user has no security impact'
    # child_process in vite.config.ts — build-time only, called with hardcoded string literals ('version', 'sha').
    # No user input reaches execSync; no injection vector.
    - rule_id: 'javascript.lang.security.detect-child-process.detect-child-process'
      path: 'web-client/vite.config.ts'
      reason: 'False positive — build-time config only; execSync is called with hardcoded string literals, no user input'
    # Bandit B607: partial executable path for git — build utility script with hardcoded args, no user input.
    - rule_id: 'B607'
      path: 'scripts/util/version.py'
      reason: 'Build utility calls git with hardcoded arguments (rev-parse --short=7 HEAD); no user input, FileNotFoundError already handled'
    # Bandit B404: subprocess import in build utility — calls git with hardcoded list args (no shell), no user input.
    - rule_id: 'B404'
      path: 'scripts/util/version.py'
      reason: 'Build utility uses subprocess with list invocation (no shell) for git with hardcoded arguments; no user input'
    - rule_id: 'B603'
      path: 'scripts/util/version.py'
      reason: 'Build utility calls git with hardcoded list arguments (no shell, no user input)'
    # (Removed: cloudfront.yml, s3.yml, apigateway-v2.yml suppressions — templates deleted in tier consolidation)
    # ========================================================================
    # Consolidated tier templates (frontend, backend, queue)
    # ========================================================================
    # --- frontend.yml (S3 + CloudFront + OAC) ---
    # S3 versioning — static web assets rebuilt from source
    - rule_id: 'CKV_AWS_21'
      path: 'infra/cfn/frontend/frontend.yml'
      reason: 'Out of scope for POC — static web assets are rebuilt from source; versioning adds storage cost with no recovery benefit. Customers can enable when productionizing.'
    # CloudFront TLS — false positive; MinimumProtocolVersion: TLSv1.2_2021 is set
    - rule_id: 'CKV_AWS_174'
      path: 'infra/cfn/frontend/frontend.yml'
      reason: 'False positive — ViewerCertificate.MinimumProtocolVersion is set to TLSv1.2_2021; checkov fails to detect it'
    # CloudFront WAF — out of scope for POC
    - rule_id: 'CKV_AWS_68'
      path: 'infra/cfn/frontend/frontend.yml'
      reason: 'Out of scope for POC — WAF requires a separate WebACL; customers can attach WebACLId when productionizing'
    # --- backend.yml (Lambda + API Gateway v2 + DynamoDB + CloudWatch) ---
    # CloudWatch Log Group KMS — out of scope for POC; backend has Lambda + API GW log groups
    - rule_id: 'CKV_AWS_158'
      path: 'infra/cfn/backend/backend.yml'
      reason: 'Out of scope for POC — CloudWatch Log Group uses default encryption; customers can add KmsKeyId when productionizing'
    # Lambda DLQ — Lambda is invoked synchronously via API Gateway
    - rule_id: 'CKV_AWS_116'
      path: 'infra/cfn/backend/backend.yml'
      reason: 'Not applicable — Lambda is invoked synchronously via API Gateway; DLQ only triggers on async invocations'
    # Lambda env var KMS — out of scope for POC
    - rule_id: 'CKV_AWS_173'
      path: 'infra/cfn/backend/backend.yml'
      reason: 'Out of scope for POC — Lambda env vars use default AWS-managed encryption; customers can add KmsKeyArn when productionizing'
    # Lambda VPC — out of scope for POC
    - rule_id: 'CKV_AWS_117'
      path: 'infra/cfn/backend/backend.yml'
      reason: 'Out of scope for POC — VPC configuration requires VPC, subnets, and security groups; customers can add VpcConfig when productionizing'
    # --- queue.yml (SQS + DLQ + worker Lambda + ESM + DynamoDB + CloudWatch) ---
    # SQS KMS encryption — queue and DLQ use SqsManagedSseEnabled (SSE-SQS) instead of CMK; out of scope for POC
    - rule_id: 'CKV_AWS_27'
      path: 'infra/cfn/queue/queue.yml'
      reason: 'Out of scope for POC — SQS uses SSE-SQS (SqsManagedSseEnabled: true); customers can add KMS CMK when productionizing'
    # CloudWatch Log Group KMS — out of scope for POC
    - rule_id: 'CKV_AWS_158'
      path: 'infra/cfn/queue/queue.yml'
      reason: 'Out of scope for POC — CloudWatch Log Group uses default encryption; customers can add KmsKeyId when productionizing'
    # Lambda DLQ — worker Lambda is invoked synchronously by SQS ESM; ESM handles retries and routes to SQS DLQ
    - rule_id: 'CKV_AWS_116'
      path: 'infra/cfn/queue/queue.yml'
      reason: 'Not applicable — worker Lambda is invoked synchronously by SQS Event Source Mapping; retries and DLQ routing handled by SQS, not Lambda DLQ'
    # Lambda env var KMS — out of scope for POC
    - rule_id: 'CKV_AWS_173'
      path: 'infra/cfn/queue/queue.yml'
      reason: 'Out of scope for POC — Lambda env vars use default AWS-managed encryption; customers can add KmsKeyArn when productionizing'
    # Lambda VPC — out of scope for POC
    - rule_id: 'CKV_AWS_117'
      path: 'infra/cfn/queue/queue.yml'
      reason: 'Out of scope for POC — VPC configuration requires VPC, subnets, and security groups; customers can add VpcConfig when productionizing'
    # ========================================================================
    # CKV_AWS_45 — Lambda env vars contain no secrets; only literals are
    # configuration values (AWS_LWA_REMOVE_BASE_PATH: '/prod', APP_INVOKE_MODE: 'BUFFERED').
    # All sensitive values are injected via CloudFormation !Ref / !If at deploy time.
    # ========================================================================
    - rule_id: 'CKV_AWS_45'
      path: 'infra/cfn/backend/backend.yml'
      reason: 'False positive — no hardcoded secrets; env var literals are config values (path prefix, mode enum), sensitive values use !Ref/!If'
    - rule_id: 'CKV_AWS_45'
      path: 'infra/cfn/queue/queue.yml'
      reason: 'False positive — no hardcoded secrets; env var literals are config values (path prefix, mode enum), sensitive values use !Ref/!If'
    # lodash / lodash-es — FIXED in both docs/ and web-client/ via npm audit fix (2026-04-10)
    # ========================================================================
    # unsafe-formatstring — template literal in console.error, not a format string.
    # The component name is interpolated as data, not as a format specifier.
    # ========================================================================
    - rule_id: 'javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring'
      path: 'web-client/src/pages/sink/components/component-wrapper.tsx'
      reason: 'False positive — template literal in console.error; component name is data interpolation, not a format specifier'
    # dangerouslySetInnerHTML in shadcn/ui ChartStyle — injects scoped CSS custom properties
    # (theme colors) from developer-defined ChartConfig, not user input. Standard shadcn/ui pattern.
    - rule_id: 'javascript-react-xss-dangerouslysetinnerhtml-atomic'
      path: 'web-client/src/components/ui/chart.tsx'
      reason: 'False positive — shadcn/ui ChartStyle component injects CSS custom properties from developer-defined ChartConfig; no user input flows into the style tag'
    # CloudFront logging IS configured (Logging.Bucket, IncludeCookies, Prefix at lines 107-110).
    # KICS cannot resolve the !Ref LogBucketDomainName intrinsic and reports the property as missing.
    - rule_id: 'CloudFront Logging Disabled'
      path: 'infra/cfn/frontend/frontend.yml'
      reason: 'False positive — Logging is configured at lines 107-110 with Bucket: !Ref LogBucketDomainName; KICS cannot resolve CloudFormation intrinsic functions'
    # API Gateway V2 Stage — AccessLogSettings IS defined with DestinationArn + Format.
    # KICS cannot resolve !GetAtt ApiGatewayLogGroup.Arn and reports the property as missing.
    - rule_id: 'API Gateway V2 Stage Access Logging Settings Not Defined'
      path: 'infra/cfn/backend/backend.yml'
      reason: 'False positive — AccessLogSettings is configured with DestinationArn: !GetAtt ApiGatewayLogGroup.Arn and JSON format string; KICS cannot resolve intrinsic functions'
    # CloudFront Without WAF — same finding as CKV_AWS_68 but from KICS scanner (different rule ID)
    - rule_id: 'CloudFront Without WAF'
      path: 'infra/cfn/frontend/frontend.yml'
      reason: 'Out of scope for POC — WAF requires a separate WebACL; customers can attach WebACLId when productionizing'
    # ========================================================================
    # codepipeline.yml (ArtifactBucket + PipelineRole)
    # ========================================================================
    # S3 access logging — out of scope for POC; artifact bucket is internal-only
    - rule_id: 'AwsSolutions-S1'
      path: 'infra/cfn/codepipeline/codepipeline.yml'
      reason: 'Out of scope for POC — pipeline artifact bucket is internal-only; customers can add LoggingConfiguration when productionizing'
    - rule_id: 'CKV_AWS_18'
      path: 'infra/cfn/codepipeline/codepipeline.yml'
      reason: 'Out of scope for POC — pipeline artifact bucket is internal-only; customers can add LoggingConfiguration when productionizing'
    # IAM wildcard — false positive; s3:::${ArtifactBucket}/* is scoped to a specific bucket,
    # not a wildcard resource. The /* suffix is required for S3 object-level access.
    - rule_id: 'AwsSolutions-IAM5'
      path: 'infra/cfn/codepipeline/codepipeline.yml'
      reason: 'False positive — s3:::${ArtifactBucket}/* is scoped to a specific named bucket; /* suffix is required for object-level GetObject/PutObject access'
    # S3 SSE — false positive; BucketEncryption IS configured with conditional KMS/AES256.
    # Checkov cannot resolve the !If intrinsic and reports SSE as missing.
    - rule_id: 'CKV_AWS_19'
      path: 'infra/cfn/codepipeline/codepipeline.yml'
      reason: 'False positive — SSE is configured via BucketEncryption with !If [HasKmsKey, aws:kms, AES256]; checkov cannot resolve CloudFormation intrinsic functions'
    # S3 versioning — pipeline artifacts are ephemeral build outputs, not source of truth
    - rule_id: 'CKV_AWS_21'
      path: 'infra/cfn/codepipeline/codepipeline.yml'
      reason: 'Out of scope for POC — pipeline artifacts are ephemeral build outputs rebuilt from source; versioning adds storage cost with no recovery benefit'
    # IAM data exfiltration — false positive; s3:GetObject is scoped to the pipeline's own
    # artifact bucket (${ArtifactBucket}/*), not a wildcard resource. Pipeline role requires
    # read/write access to its own artifacts for Source→Build stage handoff.
    - rule_id: 'IAM policy allows for data exfiltration'
      path: 'infra/cfn/codepipeline/codepipeline.yml'
      reason: 'False positive — s3:GetObject is scoped to the pipeline artifact bucket ARN, not a wildcard resource; required for pipeline stage artifact handoff'
    # ========================================================================
    # innovation-builder-security.yml — Innovation Builder IAM posture
    # (POC / non-production cross-account builder role)
    #
    # See /Users/vincilb/Documents/Code/code-aws-dev/security-artifacts/genaiic-cross-account-builder-role/.ash/.ash.yml
    # for the canonical suppression rationale. This template is the single-stack
    # variant of the same IAM posture and triggers the same findings.
    # ========================================================================
    # IAM data exfiltration (KICS) — hits line 196 (transparent-boundary Action:*) and
    # line 543 (47-service allow list in InnovationBuilderPolicy). Both are BY DESIGN:
    #   - Line 196: standard transparent-boundary pattern; boundary restricts only via
    #     its Deny statements (DenyRoleModifyWithoutBoundary, DenyBoundaryModification,
    #     DenyRemoveBoundary, DenyUserOperations, SecureLoggingConfigs, etc.).
    #   - Line 543: auditable service list replacing PowerUserAccess for POC builder role;
    #     constrained by boundary deny statements on the caller role.
    # Already suppressed for cfn_nag (CFN_NAG_F5), cdk_nag (AwsSolutions-IAM5), and
    # checkov (CKV_AWS_107/108/109/110/111) via inline Metadata on each resource.
    - rule_id: 'IAM policy allows for data exfiltration'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'By design — (1) Action:* in transparent-boundary AllowAll statement; boundary restricts via Deny statements only. (2) 47-service allow list in InnovationBuilderPolicy is the intentional POC builder-role pattern, constrained by boundary deny guardrails (SecureLoggingConfigs, SecureSecurityServices, DenyHighRiskNetworking, RestrictPublicAccess, RestrictInternetAccesstoVPC) and 4-control anti-escalation model on caller role. POC non-production environment.'
    # Matching cfn_nag/cdk_nag/checkov rules for innovation-builder-security.yml, mirrored
    # from the canonical genaiic-cross-account-builder-role/.ash/.ash.yml to ensure ASH
    # picks up the suppressions regardless of which scanner emits the finding.
    - rule_id: 'AwsSolutions-IAM4'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'By design — all three roles (CodeBuild, SageMaker, Builder, EC2) intentionally attach arn:aws:iam::aws:policy/job-function/ViewOnlyAccess for read-only console visibility. ViewOnlyAccess grants only Describe/Get/List actions. Two of three ManagedPolicyArns per role are customer-managed; ViewOnlyAccess is the sole AWS-managed policy. POC non-production environment.'
    - rule_id: 'AwsSolutions-IAM5'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'POC non-production environment — service:* permissions for 47 service namespaces with Resource:* are intentional. All roles inherit wildcard permissions from attached customer-managed policies. Access constrained by permissions boundary deny statements and anti-escalation controls.'
    - rule_id: 'CFN_NAG_F5'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'Action:* in the permissions boundary AllowAll statement is the standard transparent-boundary pattern. The boundary restricts only via Deny statements; Allow:* makes the boundary invisible to actions not explicitly denied. The 47 service:* entries in the service policy are also interpreted as Action:* by the scanner. Intentional broad service access for POC.'
    - rule_id: 'CFN_NAG_F40'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'iam:PassRole with Resource:* required for CloudFormation to pass roles to any AWS service during stack operations. Permissions boundary on the caller constrains effective permissions of passed roles. POC non-production environment.'
    - rule_id: 'CFN_NAG_W13'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'Resource:* is intentional — permissions boundary must apply to all resources, and service access policies cover dynamically-created CloudFormation resources. POC non-production environment.'
    - rule_id: 'CFN_NAG_W28'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'Explicit names required on all resources: ManagedPolicyName for self-propagating boundary condition (iam:PermissionsBoundary references boundary ARN by name), RoleName for service configuration. Replacement risk accepted for POC.'
    - rule_id: 'CKV_AWS_107'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'Credentials exposure mitigated by boundary DenyUserOperations — blocks IAM user creation, login profiles, and access key operations. No sts:* in service policy. POC non-production environment.'
    - rule_id: 'CKV_AWS_108'
      path: 'infra/cfn/security/innovation-builder-security.yml'
      reason: 'POC non-production environment with no production data. Boundary guardrails protect audit trail (SecureLoggingConfigs) and security services (SecureSecurityServices) ensuring all access is logged.'
