# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence

# ASH security scanning component
include:
  - component: code.aws.dev/proserve/automated-security-helper/automated-security-helper/ash@~latest

# Any publicly available python image
image: public.ecr.aws/docker/library/python:3.12-bookworm

stages:
  - test
#   - securityScan  # Inherited
  - deploy

# GitLab Pages deployment job - must be named "pages" to trigger Pages deployment
# Builds Docusaurus documentation and publishes to https://<namespace>.gitlab.io/<project-name>/
pages:
  stage: deploy
  needs: []
  image: public.ecr.aws/docker/library/node:22-bookworm
  variables:
    KUBERNETES_CPU_REQUEST: "2"
    KUBERNETES_CPU_LIMIT: "2"
    KUBERNETES_MEMORY_REQUEST: "4Gi"
    KUBERNETES_MEMORY_LIMIT: "4Gi"
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "4Gi"
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "4Gi"
    NODE_OPTIONS: "--max-old-space-size=3072"
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - cd docs
    - pnpm install --frozen-lockfile
  script:
    - pnpm exec docusaurus build
    - mv build ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
