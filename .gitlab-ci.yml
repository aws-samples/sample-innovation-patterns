# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence

# ASH security scanning component
# Pinned to v3.0.5 — the internal `code.aws.dev` mirror has its own version
# line (v3.0.x) that does not track upstream awslabs/automated-security-helper.
# v3.0.5 (~2026-04-23) is the version against which our existing
# `cyclonedx: enabled: false` suppression in .ash/ash.yaml was added (2026-04-21)
# and verified working. v3.0.6 (~2026-05-16) appears to backport the upstream
# regression where the new `gitlab-cyclonedx` reporter emits a minimal "empty"
# SBOM that GitLab's parser rejects with "Required GitLab CycloneDX properties
# are missing" — our existing suppression does not cover that new reporter.
# Revisit when we wire up real GitLab dependency scanning, or when the mirror
# exposes a setting to disable the gitlab-cyclonedx reporter.
include:
  - component: code.aws.dev/proserve/automated-security-helper/automated-security-helper/ash@v3.0.5
  - component: code.aws.dev/proserve/genaiid/other/candidate-reusable-assets/code-quality/acq@develop

# Any publicly available python image
image: public.ecr.aws/docker/library/python:3.12-bookworm

stages:
  - test
#   - securityScan  # Inherited
  - deploy
  - release

# GitLab Pages deployment job - must be named "pages" to trigger Pages deployment
# Builds Docusaurus documentation and publishes to https://<namespace>.gitlab.io/<project-name>/
pages:
  stage: deploy
  needs: []
  image: public.ecr.aws/docker/library/node:22-bookworm
  variables:
    KUBERNETES_CPU_REQUEST: "2"
    KUBERNETES_CPU_LIMIT: "2"
    KUBERNETES_MEMORY_REQUEST: "4Gi"
    KUBERNETES_MEMORY_LIMIT: "4Gi"
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "4Gi"
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "4Gi"
    NODE_OPTIONS: "--max-old-space-size=3072"
  before_script:
    - corepack enable
    # Internal docs (developer-docs/internal/) DO publish to GitLab Pages —
    # this site is internal-only. They are filtered from the GitHub mirror
    # by infra/scripts/github-push.sh EXCLUDE_PATHS, so they never reach
    # GitHub or GitHub Pages.
    - cd docs
    # Uses the pnpm version pinned in docs/package.json "packageManager"
    - pnpm install --frozen-lockfile
  script:
    - pnpm exec docusaurus build
    - mv build ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Manual tag-and-release: click the play button to tag the current commit,
# push to origin, and mirror to GitHub. The builder bumps VERSION and updates
# CHANGELOG before pushing; this job reads VERSION and creates the tag.
#
# The `changes: [VERSION]` guard is intentionally removed — the manual trigger
# replaces auto-detection. release-check.sh validates VERSION↔tag at runtime.
tag-and-release:
  stage: release
  image: public.ecr.aws/docker/library/python:3.12-bookworm
  variables:
    # Full clone required: github-push.sh amends the release commit and force-pushes
    # to the GitHub mirror. A shallow clone makes git's pack negotiation reference
    # ancestor objects past the shallow boundary, which GitHub rejects with
    # "did not receive expected object <sha>".
    GIT_DEPTH: "0"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: manual
      allow_failure: false
    - when: never
  needs:
    - job: ash
      optional: true
  before_script:
    # $GITHUB_DEPLOY_KEY is base64-encoded (masked + protected CI variable).
    - apt-get update -qq && apt-get install -y -qq openssh-client
    - eval $(ssh-agent -s)
    - |
      echo "GITHUB_DEPLOY_KEY raw length: ${#GITHUB_DEPLOY_KEY}"
      DECODED_LEN=$(printf '%s' "$GITHUB_DEPLOY_KEY" | base64 -di 2>/dev/null | wc -c || true)
      echo "GITHUB_DEPLOY_KEY base64-decoded length: ${DECODED_LEN:-0}"
      if [ "${DECODED_LEN:-0}" -lt 200 ]; then
        echo "ERROR: decoded value is too short (${DECODED_LEN:-0} bytes)."
        exit 1
      fi
    - printf '%s' "$GITHUB_DEPLOY_KEY" | base64 -di | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - VERSION=$(tr -d '[:space:]' < VERSION)
    - |
      if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "v$VERSION"; then
        echo "Tag v$VERSION already exists on origin — nothing to release"
        echo "Bump VERSION before clicking Tag & Release"
        exit 1
      fi
    - git config user.email "ci@code.aws.dev"
    - git config user.name "GitLab CI"
    - git tag -a "v$VERSION" -m "Release v$VERSION"
    - git push origin "v$VERSION"
    - export CI_COMMIT_TAG="v$VERSION"
    - make -f infra/scripts/release.mk release-check
    - bash infra/scripts/github-push.sh
