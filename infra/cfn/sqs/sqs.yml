AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  SQS queue with optional dead-letter queue for message processing.
  Configurable visibility timeout, retention period, and encryption.
  Part of the sqs-lambda pattern — one queue per processing pipeline.

Parameters:
  Namespace:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,11}$'
    ConstraintDescription: 'Invalid namespace — 1-12 chars, lowercase alphanumeric + hyphens, starts with letter'
    Description: 'Project namespace prefix for resource naming'

  Environment:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,11}$'
    ConstraintDescription: 'Must be 1-12 chars, lowercase letters/digits/hyphens, starts with letter'
    Description: 'Deployment environment'

  QueueName:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,29}$'
    ConstraintDescription: 'Must be 1-30 chars, lowercase letters/digits/hyphens, starts with letter'
    Description: 'Logical queue name (e.g., jobs)'

  VisibilityTimeout:
    Type: Number
    Default: 900
    MinValue: 0
    MaxValue: 43200
    Description: 'Time in seconds that a message is hidden after being received (must exceed Lambda timeout)'

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
    Description: 'Time in seconds that messages are retained in the queue (default: 4 days)'

  MaxReceiveCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 1000
    Description: 'Number of receive attempts before message is sent to DLQ'

  CreateDLQ:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Whether to create a dead-letter queue for failed messages'

  KmsKeyArn:
    Type: String
    Default: ''
    Description: 'KMS key ARN for server-side encryption (optional — leave empty for SQS-managed SSE)'

Conditions:
  HasDLQ: !Equals [!Ref CreateDLQ, 'true']
  HasKmsKey: !Not [!Equals [!Ref KmsKeyArn, '']]

Resources:
  # Main SQS queue for message processing
  Queue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Sub '${Namespace}-${Environment}-${QueueName}'
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      SqsManagedSseEnabled: !If [HasKmsKey, false, true]
      KmsMasterKeyId: !If [HasKmsKey, !Ref KmsKeyArn, !Ref 'AWS::NoValue']
      RedrivePolicy: !If
        - HasDLQ
        - deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
          maxReceiveCount: !Ref MaxReceiveCount
        - !Ref 'AWS::NoValue'
      Tags:
        - Key: Namespace
          Value: !Ref Namespace
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: !Sub 'Message queue for ${QueueName} processing pipeline'

  # Dead-letter queue for failed messages (conditional)
  DeadLetterQueue:
    Type: 'AWS::SQS::Queue'
    Condition: HasDLQ
    Properties:
      QueueName: !Sub '${Namespace}-${Environment}-${QueueName}-dlq'
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: !If [HasKmsKey, false, true]
      KmsMasterKeyId: !If [HasKmsKey, !Ref KmsKeyArn, !Ref 'AWS::NoValue']
      Tags:
        - Key: Namespace
          Value: !Ref Namespace
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: !Sub 'Dead-letter queue for failed ${QueueName} messages'

  # Queue policy — deny non-SSL access
  QueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref Queue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 'sqs:*'
            Resource: !GetAtt Queue.Arn
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

Outputs:
  QueueUrl:
    Description: 'SQS queue URL for message send/receive operations'
    Value: !Ref Queue
    Export:
      Name: !Sub '${AWS::StackName}-QueueUrl'

  QueueArn:
    Description: 'SQS queue ARN for IAM policy scoping and event source mapping'
    Value: !GetAtt Queue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'

  QueueName:
    Description: 'Physical queue name for monitoring and debugging'
    Value: !GetAtt Queue.QueueName
    Export:
      Name: !Sub '${AWS::StackName}-QueueName'

  DlqUrl:
    Condition: HasDLQ
    Description: 'Dead-letter queue URL for monitoring failed messages'
    Value: !Ref DeadLetterQueue
    Export:
      Name: !Sub '${AWS::StackName}-DlqUrl'

  DlqArn:
    Condition: HasDLQ
    Description: 'Dead-letter queue ARN for monitoring and alarm configuration'
    Value: !GetAtt DeadLetterQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DlqArn'
