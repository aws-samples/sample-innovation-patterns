AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Application-level CloudWatch observability: metric filters for error detection
  on Lambda log groups, a modular dashboard (errors, Lambda health, API Gateway,
  Bedrock), and disabled-by-default alarms as commented examples.

Parameters:
  # --- Configuration parameters (sourced from .env or defaults) ---

  Namespace:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,11}$'
    ConstraintDescription: 'Invalid namespace - 1-12 chars, lowercase alphanumeric + hyphens, starts with letter'
    Description: 'Project namespace prefix for resource naming'

  Environment:
    Type: String
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Deployment environment'

  # --- Optional overrides (convention-based defaults) ---

  LambdaLogGroupName:
    Type: String
    Default: ''
    Description: >-
      Optional override for the Lambda log group name used by metric filters.
      If empty, uses the convention: /aws/lambda/{Namespace}-{Environment}-*
      (wildcard matches all Lambda functions in the namespace).

  ApiGatewayLogGroupName:
    Type: String
    Default: ''
    Description: >-
      Optional override for the API Gateway log group name.
      If empty, uses the convention: /aws/apigateway/{Namespace}-{Environment}-apigwv2.
      Currently used for dashboard reference only (no metric filters on API GW logs).

  MetricNamespace:
    Type: String
    Default: ''
    Description: >-
      Optional override for the custom CloudWatch metric namespace.
      If empty, uses the convention: {Namespace}/{Environment}.
      This must match the APP_METRIC_NAMESPACE env var in the observability module.

  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      SNS topic ARN for alarm actions. Alarms are disabled by default
      (ActionsEnabled: false). To enable: set ActionsEnabled to true and
      provide this ARN. See alarm resources for instructions.

Conditions:
  HasCustomLambdaLogGroup: !Not [!Equals [!Ref LambdaLogGroupName, '']]
  HasCustomApiGatewayLogGroup: !Not [!Equals [!Ref ApiGatewayLogGroupName, '']]
  HasCustomMetricNamespace: !Not [!Equals [!Ref MetricNamespace, '']]

Resources:
  # ============================================================================
  # METRIC FILTERS
  # Attach to existing Lambda log groups to extract error/exception counts.
  # These do NOT create log groups — they consume existing ones from ipa.stack.lambda.
  # ============================================================================

  # Metric filter: ApplicationErrors
  # Matches any log line containing "ERROR" (Loguru default format includes level).
  # Example matching lines:
  #   2026-04-01 12:00:00.123 | ERROR | app_lib.rest.app:dispatch:42 - Internal error
  #   {"level": "ERROR", "exception": "ValueError", ...}
  ApplicationErrorsFilter:
    Type: 'AWS::Logs::MetricFilter'
    Properties:
      LogGroupName: !If
        - HasCustomLambdaLogGroup
        - !Ref LambdaLogGroupName
        - !Sub '/aws/lambda/${Namespace}-${Environment}-*'
      FilterName: !Sub '${Namespace}-${Environment}-application-errors'
      FilterPattern: 'ERROR'
      MetricTransformations:
        - MetricNamespace: !If
            - HasCustomMetricNamespace
            - !Ref MetricNamespace
            - !Sub '${Namespace}/${Environment}'
          MetricName: ApplicationErrorCount
          MetricValue: '1'
          DefaultValue: 0

  # Metric filter: UnhandledExceptions
  # Matches structured JSON logs from the observability module ("exception":)
  # or Python stack traces (Traceback).
  # Example matching lines:
  #   {"level": "ERROR", "exception": "ValueError", "message": "invalid input", ...}
  #   Traceback (most recent call last):
  UnhandledExceptionsFilter:
    Type: 'AWS::Logs::MetricFilter'
    Properties:
      LogGroupName: !If
        - HasCustomLambdaLogGroup
        - !Ref LambdaLogGroupName
        - !Sub '/aws/lambda/${Namespace}-${Environment}-*'
      FilterName: !Sub '${Namespace}-${Environment}-unhandled-exceptions'
      FilterPattern: '?"\"exception\":" ?Traceback'
      MetricTransformations:
        - MetricNamespace: !If
            - HasCustomMetricNamespace
            - !Ref MetricNamespace
            - !Sub '${Namespace}/${Environment}'
          MetricName: UnhandledExceptionCount
          MetricValue: '1'
          DefaultValue: 0

  # ============================================================================
  # ALARMS (disabled by default)
  # To enable an alarm:
  #   1. Set ActionsEnabled to true
  #   2. Add your SNS topic ARN to AlarmActions and OKActions
  #   3. Re-deploy the stack
  # ============================================================================

  # Alarm: HighErrorRate — fires when ApplicationErrorCount >= 5 in 5 minutes
  HighErrorRateAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${Namespace}-${Environment}-high-error-rate'
      AlarmDescription: !Sub >-
        Application error rate threshold for ${Namespace}-${Environment}.
        Fires when ApplicationErrorCount >= 5 in a 5-minute period.
        To enable: set ActionsEnabled to true and add an SNS topic ARN.
      Namespace: !If
        - HasCustomMetricNamespace
        - !Ref MetricNamespace
        - !Sub '${Namespace}/${Environment}'
      MetricName: ApplicationErrorCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      # --- DISABLED BY DEFAULT ---
      # To enable: change ActionsEnabled to true and uncomment AlarmActions/OKActions
      ActionsEnabled: false
      # AlarmActions:
      #   - !Ref AlarmSnsTopicArn
      # OKActions:
      #   - !Ref AlarmSnsTopicArn

  # Alarm: HighExceptionRate — fires when UnhandledExceptionCount >= 5 in 5 minutes
  HighExceptionRateAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${Namespace}-${Environment}-high-exception-rate'
      AlarmDescription: !Sub >-
        Unhandled exception rate threshold for ${Namespace}-${Environment}.
        Fires when UnhandledExceptionCount >= 5 in a 5-minute period.
        To enable: set ActionsEnabled to true and add an SNS topic ARN.
      Namespace: !If
        - HasCustomMetricNamespace
        - !Ref MetricNamespace
        - !Sub '${Namespace}/${Environment}'
      MetricName: UnhandledExceptionCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      # --- DISABLED BY DEFAULT ---
      ActionsEnabled: false
      # AlarmActions:
      #   - !Ref AlarmSnsTopicArn
      # OKActions:
      #   - !Ref AlarmSnsTopicArn

  # ============================================================================
  # DASHBOARD
  # Modular CloudWatch dashboard with four sections plus an extensibility marker.
  # Uses Fn::Sub for dynamic references (region, namespace, environment).
  # Dashboard JSON uses ${!varName} escape syntax for non-CloudFormation variables.
  # ============================================================================

  AppDashboard:
    Type: 'AWS::CloudWatch::Dashboard'
    Properties:
      DashboardName: !Sub '${Namespace}-${Environment}-app-dashboard'
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "type": "text",
                "x": 0,
                "y": 0,
                "width": 24,
                "height": 1,
                "properties": {
                  "markdown": "# Application Errors\nCustom metric filters on Lambda log groups — tracks ERROR log lines and structured exception JSON."
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 1,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "${MetricNs}", "ApplicationErrorCount", { "stat": "Sum", "period": 300 } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Application Errors (5-min)",
                  "yAxis": { "left": { "min": 0 } }
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 1,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "${MetricNs}", "UnhandledExceptionCount", { "stat": "Sum", "period": 300 } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Unhandled Exceptions (5-min)",
                  "yAxis": { "left": { "min": 0 } }
                }
              },
              {
                "type": "text",
                "x": 0,
                "y": 7,
                "width": 24,
                "height": 1,
                "properties": {
                  "markdown": "# Lambda Health\nBuilt-in AWS/Lambda metrics — invocations, duration percentiles, errors, and throttles."
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 8,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ { "expression": "SEARCH('{AWS/Lambda,FunctionName} FunctionName=\"${Namespace}-${Environment}\" MetricName=\"Invocations\"', 'Sum', 300)", "id": "e1" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Invocations"
                }
              },
              {
                "type": "metric",
                "x": 8,
                "y": 8,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ { "expression": "SEARCH('{AWS/Lambda,FunctionName} FunctionName=\"${Namespace}-${Environment}\" MetricName=\"Duration\"', 'p50', 300)", "id": "e1", "label": "p50" } ],
                    [ { "expression": "SEARCH('{AWS/Lambda,FunctionName} FunctionName=\"${Namespace}-${Environment}\" MetricName=\"Duration\"', 'p90', 300)", "id": "e2", "label": "p90" } ],
                    [ { "expression": "SEARCH('{AWS/Lambda,FunctionName} FunctionName=\"${Namespace}-${Environment}\" MetricName=\"Duration\"', 'p99', 300)", "id": "e3", "label": "p99" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Duration (p50/p90/p99)"
                }
              },
              {
                "type": "metric",
                "x": 16,
                "y": 8,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ { "expression": "SEARCH('{AWS/Lambda,FunctionName} FunctionName=\"${Namespace}-${Environment}\" MetricName=\"Errors\"', 'Sum', 300)", "id": "e1" } ],
                    [ { "expression": "SEARCH('{AWS/Lambda,FunctionName} FunctionName=\"${Namespace}-${Environment}\" MetricName=\"Throttles\"', 'Sum', 300)", "id": "e2" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Errors + Throttles"
                }
              },
              {
                "type": "text",
                "x": 0,
                "y": 14,
                "width": 24,
                "height": 1,
                "properties": {
                  "markdown": "# API Gateway\nBuilt-in AWS/ApiGateway metrics — request count, latency percentiles, and HTTP error rates."
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 15,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ApiGateway", "Count", "ApiId", "${Namespace}-${Environment}-apigwv2", { "stat": "Sum", "period": 300 } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Requests"
                }
              },
              {
                "type": "metric",
                "x": 8,
                "y": 15,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ApiGateway", "Latency", "ApiId", "${Namespace}-${Environment}-apigwv2", { "stat": "p50", "period": 300 } ],
                    [ "AWS/ApiGateway", "Latency", "ApiId", "${Namespace}-${Environment}-apigwv2", { "stat": "p90", "period": 300 } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Latency (p50/p90)"
                }
              },
              {
                "type": "metric",
                "x": 16,
                "y": 15,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ApiGateway", "4xx", "ApiId", "${Namespace}-${Environment}-apigwv2", { "stat": "Sum", "period": 300 } ],
                    [ "AWS/ApiGateway", "5xx", "ApiId", "${Namespace}-${Environment}-apigwv2", { "stat": "Sum", "period": 300 } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "4xx + 5xx Errors"
                }
              },
              {
                "type": "text",
                "x": 0,
                "y": 21,
                "width": 24,
                "height": 1,
                "properties": {
                  "markdown": "# Bedrock Usage\nBuilt-in AWS/Bedrock metrics — token counts and throttling. Metrics appear after first Bedrock invocation."
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 22,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ { "expression": "SEARCH('{AWS/Bedrock,ModelId} MetricName=\"InputTokenCount\"', 'Sum', 300)", "id": "e1", "label": "InputTokens" } ],
                    [ { "expression": "SEARCH('{AWS/Bedrock,ModelId} MetricName=\"OutputTokenCount\"', 'Sum', 300)", "id": "e2", "label": "OutputTokens" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Token Usage (Input + Output)"
                }
              },
              {
                "type": "metric",
                "x": 8,
                "y": 22,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ { "expression": "SEARCH('{AWS/Bedrock,ModelId} MetricName=\"InvocationLatency\"', 'Average', 300)", "id": "e1" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Invocation Latency"
                }
              },
              {
                "type": "metric",
                "x": 16,
                "y": 22,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ { "expression": "SEARCH('{AWS/Bedrock,ModelId} MetricName=\"InvocationThrottles\"', 'Sum', 300)", "id": "e1" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Invocation Throttles"
                }
              }
            ]
          }
        - MetricNs: !If
            - HasCustomMetricNamespace
            - !Ref MetricNamespace
            - !Sub '${Namespace}/${Environment}'

  # --- ADD CUSTOM WIDGETS BELOW ---
  # To add a custom widget, create a new AWS::CloudWatch::Dashboard resource
  # or modify the DashboardBody JSON above. Widget template:
  #
  # { "type": "metric", "x": 0, "y": 28, "width": 12, "height": 6,
  #   "properties": {
  #     "metrics": [[ "YourNamespace", "YourMetric", { "stat": "Sum", "period": 300 } ]],
  #     "view": "timeSeries", "region": "${AWS::Region}", "title": "Your Title"
  #   }
  # }

Outputs:
  DashboardName:
    Description: 'CloudWatch dashboard name — open in the CloudWatch console to view application metrics'
    Value: !Sub '${Namespace}-${Environment}-app-dashboard'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardName'

  DashboardUrl:
    Description: 'Direct URL to the CloudWatch dashboard in the AWS console'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards/dashboard/${Namespace}-${Environment}-app-dashboard'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardUrl'

  MetricNamespace:
    Description: 'Custom metric namespace used by metric filters and the observability module'
    Value: !If
      - HasCustomMetricNamespace
      - !Ref MetricNamespace
      - !Sub '${Namespace}/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-MetricNamespace'
