AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cognito User Pool and Client Configuration'

Parameters:
  Namespace:
    Type: String
    Default: 'app'
    Description: 'Namespace prefix for resource names'

  UserPoolName:
    Type: String
    Default: ''
    Description: 'Explicit User Pool name (auto-generated from Namespace if empty)'

  MinPasswordLength:
    Type: Number
    Default: 8
    Description: 'Minimum length for user passwords'

  DeletionProtection:
      Type: String
      Default: 'INACTIVE'
      AllowedValues: ['ACTIVE', 'INACTIVE']
      Description: 'Enable deletion protection for the User Pool'

  CreateIdentityPool:
    Type: String
    Default: false
    AllowedValues: [true, false]
    Description: 'Whether to create an Identity Pool and associated resources'

  CallbackURL:
    Type: String
    Default: 'http://localhost:8080/authentication/callback'
    Description: 'Allowed callback URL for OAuth authentication'

  CognitoDomainPrefix:
    Type: String
    # Must NOT contain reserved words: cognito, aws, amazon (Cognito rejects them).
    # The deploy tool auto-strips these when generating a prefix from the stack name.
    Description: 'Domain prefix for Cognito hosted UI (must be globally unique)'

Conditions:
  HasUserPoolName: !Not [!Equals [!Ref UserPoolName, '']]
  ShouldCreateIdentityPool: !Equals [!Ref CreateIdentityPool, true]

Resources:
  CognitoUserPool:
    Type: 'AWS::Cognito::UserPool'
    Metadata:
      cdk_nag:
        rules_to_suppress:
          - id: AwsSolutions-COG2
            reason: 'MFA not required — this is a proof-of-concept deployment with admin-only user creation'
          - id: AwsSolutions-COG3
            reason: 'AdvancedSecurityMode is already set to ENFORCED — false positive from scanner'
    Properties:
      UserPoolName: !If
        - HasUserPoolName
        - !Ref UserPoolName
        - !Sub '${Namespace}-cognito-user-pool-${AWS::AccountId}-${AWS::Region}'
      AutoVerifiedAttributes:
        - email
      DeletionProtection: !Ref DeletionProtection
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref MinPasswordLength
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      UserPoolAddOns:
        AdvancedSecurityMode: ENFORCED

  CognitoUserPoolClient:
      Type: 'AWS::Cognito::UserPoolClient'
      Properties:
        UserPoolId: !Ref CognitoUserPool
        ClientName: !Sub '${Namespace}-cognito-client-${AWS::AccountId}-${AWS::Region}'
        GenerateSecret: false  # pragma: allowlist secret
        TokenValidityUnits:
          AccessToken: 'minutes'
          IdToken: 'minutes'
          RefreshToken: 'minutes'
        AccessTokenValidity: 480      # 8 hours
        IdTokenValidity: 480          # 8 hours
        RefreshTokenValidity: 1440    # 24 hours
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED
        # OAuth 2.0 Configuration for managed login
        AllowedOAuthFlows:
          - code  # Authorization Code Grant
        AllowedOAuthScopes:
          - openid
          - profile
          - email
        AllowedOAuthFlowsUserPoolClient: true
        CallbackURLs:
          - !Ref CallbackURL
          - 'http://localhost:8080/authentication/callback'
        LogoutURLs:
          - !Ref CallbackURL
          - 'http://localhost:8080/authentication/callback'
          # Root URLs for post-logout redirect (Cognito logout_uri must be registered)
          - !Join ['', [!Select [0, !Split ['/authentication', !Ref CallbackURL]], '']]
          - 'http://localhost:8080'
        SupportedIdentityProviders:
          - COGNITO  # Cognito User Pool as identity provider

  CognitoUserPoolDomain:
    Type: 'AWS::Cognito::UserPoolDomain'
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Domain: !Ref CognitoDomainPrefix
      ManagedLoginVersion: 2

  ManagedLoginBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    DependsOn: CognitoUserPoolDomain
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientId: !Ref CognitoUserPoolClient
      UseCognitoProvidedValues: true

  CognitoIdentityPool:
    Type: 'AWS::Cognito::IdentityPool'
    Condition: ShouldCreateIdentityPool
    Properties:
      IdentityPoolName: !Sub '${Namespace}-identity-pool-${AWS::AccountId}-${AWS::Region}'
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClient
          ProviderName: !GetAtt CognitoUserPool.ProviderName
          ServerSideTokenCheck: true

  CognitoIdentityPoolRoles:
    Type: 'AWS::Cognito::IdentityPoolRoleAttachment'
    Condition: ShouldCreateIdentityPool
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn

  CognitoAuthenticatedRole:
    Type: 'AWS::IAM::Role'
    Condition: ShouldCreateIdentityPool
    Metadata:
      cdk_nag:
        rules_to_suppress:
          - id: AwsSolutions-IAM4
            reason: 'No AWS managed policies used — role uses only an inline policy with scoped cognito-sync actions on a specific Identity Pool resource ARN'
          - id: AwsSolutions-IAM5
            reason: 'No wildcard permissions — all actions are explicitly enumerated and the resource is scoped to the specific Identity Pool ARN'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: 'cognito-identity.amazonaws.com'
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                'cognito-identity.amazonaws.com:amr': authenticated
      Policies:
        - PolicyName: 'CognitoAuthenticatedPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cognito-sync:GetBulkPublishDetails'
                  - 'cognito-sync:GetCognitoEvents'
                  - 'cognito-sync:GetIdentityPoolConfiguration'
                  - 'cognito-sync:ListIdentityPoolUsage'
                  - 'cognito-sync:SetCognitoEvents'
                  - 'cognito-sync:QueryRecords'
                  - 'cognito-sync:RegisterDevice'
                  - 'cognito-sync:SubscribeToDataset'
                  - 'cognito-sync:UnsubscribeFromDataset'
                  - 'cognito-sync:UpdateRecords'
                  - 'cognito-sync:ListRecords'
                  - 'cognito-sync:ListDatasets'
                Resource: !Sub 'arn:aws:cognito-sync:${AWS::Region}:${AWS::AccountId}:identitypool/${CognitoIdentityPool}'


Outputs:
  UserPoolId:
    Description: 'ID of the Cognito User Pool'
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolArn:
    Description: 'ARN of the Cognito User Pool'
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolArn'

  UserPoolClientId:
    Description: 'ID of the Cognito User Pool Client'
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  IdentityPoolId:
    Description: 'ID of the Cognito Identity Pool'
    Condition: ShouldCreateIdentityPool
    Value: !Ref CognitoIdentityPool
    Export:
      Name: !Sub '${AWS::StackName}-IdentityPoolId'

  CognitoDomain:
    Description: 'Cognito User Pool Domain'
    Value: !Ref CognitoUserPoolDomain
    Export:
      Name: !Sub '${AWS::StackName}-CognitoDomain'

  HostedUIURL:
    Description: 'Cognito Hosted UI Login URL'
    Value: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${CognitoUserPoolClient}&response_type=code&scope=openid+profile+email&redirect_uri=${CallbackURL}'
    Export:
      Name: !Sub '${AWS::StackName}-HostedUIURL'

  LogoutURL:
    Description: 'Cognito Hosted UI Logout URL'
    Value: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/logout?client_id=${CognitoUserPoolClient}&logout_uri=${CallbackURL}'
    Export:
      Name: !Sub '${AWS::StackName}-LogoutURL'

  EndSessionEndpoint:
    Description: 'Cognito logout base URL (use as OIDC_END_SESSION_ENDPOINT)'
    Value: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/logout'
    Export:
      Name: !Sub '${AWS::StackName}-EndSessionEndpoint'

  DiscoveryUrl:
    Description: 'OIDC Discovery URL (full path with /.well-known/openid-configuration)'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-DiscoveryUrl'

  IssuerUrl:
    Description: 'OIDC Issuer URL (base URL, use as OIDC_AUTHORITY and AUTH_ISSUER)'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'
    Export:
      Name: !Sub '${AWS::StackName}-IssuerUrl'
