AWSTemplateFormatVersion: '2010-09-09'
Description: 'Private S3 bucket for static web hosting via CloudFront OAC'

Parameters:
  Namespace:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,11}$'
    ConstraintDescription: 'Invalid namespace'
    Description: 'Project namespace prefix for resource naming'

  Environment:
    Type: String
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Deployment environment'

  BucketNameSuffix:
    Type: String
    Default: web
    Description: 'Suffix for bucket name (bucket = {ns}-{env}-{suffix}-{account_id})'

Resources:
  WebBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${Namespace}-${Environment}-${BucketNameSuffix}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Namespace
          Value: !Ref Namespace
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: 'Static web assets for CloudFront distribution'

  # Empty bucket policy — CloudFront stack adds OAC read access
  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement: []

Outputs:
  BucketName:
    Description: S3 bucket name
    Value: !Ref WebBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt WebBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'

  BucketDomainName:
    Description: S3 bucket regional domain name for CloudFront origin
    Value: !GetAtt WebBucket.RegionalDomainName
    Export:
      Name: !Sub '${AWS::StackName}-BucketDomainName'
