AWSTemplateFormatVersion: '2010-09-09'
Description: 'Frontend tier — S3 static hosting + CloudFront distribution + OAC'

# ============================================================================
# PARAMETERS
# ============================================================================
Parameters:
  Namespace:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,11}$'
    ConstraintDescription: 'Invalid namespace'
    Description: 'Project namespace prefix for resource naming'

  Environment:
    Type: String
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Deployment environment'

  BucketNameSuffix:
    Type: String
    Default: web
    Description: 'Suffix for bucket name (bucket = {ns}-{env}-{suffix}-{account_id})'

  LogBucketDomainName:
    Type: String
    Description: 'S3 log bucket domain name for access logs (e.g., {bucket}.s3.amazonaws.com). From security stack.'

# ============================================================================
# RESOURCES — S3 Bucket
# ============================================================================
Resources:
  WebBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${Namespace}-${Environment}-${BucketNameSuffix}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Select [0, !Split ['.', !Ref LogBucketDomainName]]
        LogFilePrefix: !Sub 's3-access-logs/${Namespace}-${Environment}-${BucketNameSuffix}/'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Namespace
          Value: !Ref Namespace
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: 'Static web assets for CloudFront distribution'

  # ==========================================================================
  # RESOURCES — CloudFront Distribution + OAC
  # ==========================================================================
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Namespace}-${Environment}-oac'
        Description: !Sub 'OAC for ${Namespace}-${Environment} S3 bucket'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub '${Namespace}-${Environment} web application'
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            # Internal wiring: !GetAtt replaces cross-stack S3BucketDomainName parameter
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
          DefaultTTL: 300
          MaxTTL: 3600
          MinTTL: 0
          Compress: true
        # SPA routing: return index.html for 403/404 so React Router handles all paths
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Logging:
          Bucket: !Ref LogBucketDomainName
          IncludeCookies: false
          Prefix: 'cloudfront-logs/'
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021
      Tags:
        - Key: Namespace
          Value: !Ref Namespace
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: 'CDN for static web application'

  # Grant CloudFront OAC read access to S3 bucket
  # Internal wiring: !GetAtt replaces cross-stack S3BucketArn/S3BucketName parameters
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

# ============================================================================
# OUTPUTS
# ============================================================================
Outputs:
  AppUrl:
    Description: CloudFront distribution URL (application entry point)
    Value: !Sub 'https://${Distribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-AppUrl'

  DistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref Distribution
    Export:
      Name: !Sub '${AWS::StackName}-DistributionId'

  DistributionDomainName:
    Description: CloudFront domain name
    Value: !GetAtt Distribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-DistributionDomainName'

  BucketName:
    Description: S3 bucket name (for upload-frontend sync target)
    Value: !Ref WebBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'
