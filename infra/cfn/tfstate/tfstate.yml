AWSTemplateFormatVersion: '2010-09-09'
Description: 'Terraform state backend — S3 bucket + DynamoDB lock table'

Parameters:
  Namespace:
    Type: String
    AllowedPattern: '^[a-z][a-z0-9-]{0,11}$'
  Environment:
    Type: String
    AllowedValues: ['dev', 'staging', 'prod']

Resources:
  StateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub '${Namespace}-${Environment}-tfstate-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  StateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StateBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt StateBucket.Arn
              - !Sub '${StateBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  LockTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${Namespace}-${Environment}-tfstate-lock'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  StateBucketName:
    Value: !Ref StateBucket
    Export:
      Name: !Sub '${AWS::StackName}-StateBucketName'
  LockTableName:
    Value: !Ref LockTable
    Export:
      Name: !Sub '${AWS::StackName}-LockTableName'
