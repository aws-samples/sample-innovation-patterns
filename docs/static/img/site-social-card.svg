<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Light background -->
  <rect width="1280" height="640" fill="#F5F5F5"/>

  <!-- Logo — 3x3 diagonal gradient grid, scaled to ~300px -->
  <g transform="translate(200, 170) scale(0.75)">
    <g transform="translate(6, 6)">
      <!-- Row 1 -->
      <rect x="0"   y="0"   width="126" height="126" rx="8" fill="#b8e0fa"/>
      <rect x="131" y="0"   width="126" height="126" rx="8" fill="#8ec8f0"/>
      <rect x="262" y="0"   width="126" height="126" rx="8" fill="#5a9fd4"/>
      <!-- Row 2 -->
      <rect x="0"   y="131" width="126" height="126" rx="8" fill="#8ec8f0"/>
      <rect x="131" y="131" width="126" height="126" rx="8" fill="#4a8cc0"/>
      <rect x="262" y="131" width="126" height="126" rx="8" fill="#1e4d7a"/>
      <!-- Row 3 -->
      <rect x="0"   y="262" width="126" height="126" rx="8" fill="#5a9fd4"/>
      <rect x="131" y="262" width="126" height="126" rx="8" fill="#1a3a5c"/>
      <rect x="262" y="262" width="126" height="126" rx="8" fill="#0f2235"/>
    </g>
  </g>

  <!-- Title — two lines, all lowercase -->
  <text x="540" y="270" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="110" font-weight="700" fill="#1A1A1A" dominant-baseline="middle">innovation</text>
  <text x="540" y="390" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="110" font-weight="700" fill="#1A1A1A" dominant-baseline="middle">patterns</text>
</svg>