AWSTemplateFormatVersion: "2010-09-09"
Description: Test stack for utils unit tests
Parameters:
  TableName:
    Type: String
    Default: test-table
Resources:
  TestTable:
    Type: AWS::DynamoDB::Table
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_119
            comment: Test fixture - KMS CMK not needed for unit tests
          - id: CKV_AWS_28
            comment: Test fixture - PITR not needed for unit tests
      cdk_nag:
        rules_to_suppress:
          - id: AwsSolutions-DDB3
            reason: Test fixture - PITR not needed for unit tests
      cfn_nag:
        rules_to_suppress:
          - id: W78
            reason: Test fixture - PITR not needed for unit tests
          - id: W74
            reason: Test fixture - KMS CMK not needed for unit tests
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
Outputs:
  TableArn:
    Value: !GetAtt TestTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"
  TableName:
    Value: !Ref TestTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"
